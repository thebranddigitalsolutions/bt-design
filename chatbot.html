<!-- BoilerTech Energy — Chatbot Widget (fetch-inject safe) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Sora:wght@600;700&display=swap');
  :root{--bt-primary:#FFA500;--bt-blue:#1CB5D8;--bt-green:#7CFC00;--bt-dark:#1A1D23;--bt-mid:#252830;--bt-surface:#2D3039;--bt-text:#E8E9EC;--bt-muted:#9EA1AB;--bt-border:rgba(255,255,255,0.06);}
  .bt-trigger{position:fixed;bottom:28px;right:28px;z-index:99998;width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));box-shadow:0 8px 32px rgba(255,165,0,0.4),0 0 0 4px rgba(255,165,0,0.1);display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.34,1.56,.64,1);animation:btPulse 3s ease-in-out infinite;}
  .bt-trigger:hover{transform:scale(1.1);}
  @keyframes btPulse{0%,100%{box-shadow:0 8px 32px rgba(255,165,0,0.4),0 0 0 4px rgba(255,165,0,0.1);}50%{box-shadow:0 8px 32px rgba(255,165,0,0.55),0 0 0 9px rgba(255,165,0,0.07);}}
  .bt-trigger svg{width:28px;height:28px;fill:#fff;transition:transform .3s;}
  .bt-trigger.active svg{transform:rotate(90deg);}
  .bt-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:#22C55E;border-radius:50%;border:3px solid #111;display:none;}
  .bt-window{position:fixed;bottom:104px;right:28px;z-index:99999;width:400px;max-width:calc(100vw - 32px);height:600px;max-height:calc(100vh - 140px);background:var(--bt-dark);border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden;opacity:0;transform:translateY(20px) scale(.95);pointer-events:none;transition:all .35s cubic-bezier(.34,1.56,.64,1);}
  .bt-window.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
  .bt-head{background:linear-gradient(135deg,var(--bt-mid),var(--bt-surface));padding:16px 18px;border-bottom:1px solid var(--bt-border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .bt-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bt-logo svg{width:22px;height:22px;fill:#fff;}
  .bt-head-info{flex:1;}
  .bt-head-info h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;}
  .bt-online{display:flex;align-items:center;gap:5px;margin-top:2px;font-size:12px;color:#22C55E;font-family:'DM Sans',sans-serif;}
  .bt-online::before{content:'';width:6px;height:6px;background:#22C55E;border-radius:50%;display:inline-block;animation:onlinePulse 2s ease-in-out infinite;}
  @keyframes onlinePulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .bt-close{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;}
  .bt-close:hover{background:rgba(255,255,255,.12);}
  .bt-close svg{width:16px;height:16px;stroke:var(--bt-muted);stroke-width:2;fill:none;}
  .bt-msgs{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  .bt-msgs::-webkit-scrollbar{width:3px;}
  .bt-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}
  .bt-msg{display:flex;gap:10px;max-width:90%;animation:msgIn .35s cubic-bezier(.34,1.56,.64,1);}
  @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .bt-msg.bot{align-self:flex-start;}
  .bt-msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .bt-av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
  .bt-msg.bot .bt-av{background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));}
  .bt-msg.user .bt-av{background:linear-gradient(135deg,#3B82F6,#2563EB);}
  .bt-av svg{width:14px;height:14px;fill:#fff;}
  .bt-bubble{padding:11px 15px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:13.5px;line-height:1.55;color:var(--bt-text);}
  .bt-msg.bot .bt-bubble{background:var(--bt-surface);border:1px solid var(--bt-border);border-bottom-left-radius:4px;}
  .bt-msg.user .bt-bubble{background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));color:#fff;border-bottom-right-radius:4px;}
  .bt-bubble strong{color:#fff;font-weight:600;}
  .bt-bubble a{color:#7CFC00;text-decoration:none;}
  .bt-qrs{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;padding-left:40px;animation:msgIn .45s ease;}
  .bt-qr{padding:8px 15px;border-radius:20px;border:1px solid rgba(255,165,0,.3);background:rgba(255,165,0,.08);color:#7CFC00;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap;}
  .bt-qr:hover{background:rgba(255,165,0,.18);border-color:rgba(255,165,0,.5);transform:translateY(-1px);}
  .bt-typing{display:flex;gap:10px;align-self:flex-start;max-width:90%;animation:msgIn .3s ease;}
  .bt-typing-dots{display:flex;gap:4px;padding:14px 18px;background:var(--bt-surface);border:1px solid var(--bt-border);border-radius:14px;border-bottom-left-radius:4px;}
  .bt-typing-dots span{width:7px;height:7px;background:var(--bt-muted);border-radius:50%;animation:dot 1.4s ease-in-out infinite;}
  .bt-typing-dots span:nth-child(2){animation-delay:.2s;}
  .bt-typing-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}
  .bt-inp-area{padding:12px 14px;border-top:1px solid var(--bt-border);background:var(--bt-mid);display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .bt-inp{flex:1;padding:11px 15px;border-radius:12px;border:1px solid var(--bt-border);background:var(--bt-surface);color:var(--bt-text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border .2s;}
  .bt-inp::placeholder{color:var(--bt-muted);}
  .bt-inp:focus{border-color:rgba(255,165,0,.4);}
  .bt-send{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.25s;}
  .bt-send:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(255,165,0,.4);}
  .bt-send svg{width:18px;height:18px;fill:#fff;}
  .bt-foot{text-align:center;padding:7px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--bt-muted);background:var(--bt-mid);border-top:1px solid var(--bt-border);opacity:.6;flex-shrink:0;}
  .bt-svc-card{background:var(--bt-surface);border:1px solid var(--bt-border);border-radius:12px;padding:13px 15px;margin-top:4px;cursor:pointer;transition:.2s;}
  .bt-svc-card:hover{border-color:rgba(255,165,0,.25);}
  .bt-svc-card h5{font-family:'Sora',sans-serif;font-size:12.5px;color:#7CFC00;margin-bottom:5px;}
  .bt-svc-card p{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--bt-muted);line-height:1.5;}
  .bt-lead-form{background:var(--bt-surface);border:1px solid var(--bt-border);border-radius:14px;padding:15px;display:flex;flex-direction:column;gap:9px;}
  .bt-lead-form h4{font-family:'Sora',sans-serif;font-size:13px;color:#7CFC00;margin-bottom:2px;}
  .bt-lead-form input,.bt-lead-form textarea{padding:9px 13px;border-radius:8px;border:1px solid var(--bt-border);background:var(--bt-dark);color:var(--bt-text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .2s;width:100%;}
  .bt-lead-form input:focus,.bt-lead-form textarea:focus{border-color:rgba(255,165,0,.4);}
  .bt-lead-form textarea{resize:none;height:58px;}
  .bt-lead-submit{padding:10px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--bt-primary),var(--bt-blue));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.25s;}
  .bt-lead-submit:hover{transform:translateY(-1px);}
  .bt-wa{display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);cursor:pointer;transition:.25s;text-decoration:none;margin-top:5px;}
  .bt-wa:hover{background:rgba(34,197,94,.18);transform:translateY(-1px);}
  .bt-wa svg{width:22px;height:22px;fill:#22C55E;flex-shrink:0;}
  .bt-wa span{font-family:'DM Sans',sans-serif;font-size:13px;color:#22C55E;font-weight:500;}
  @media(max-width:480px){.bt-window{bottom:0;right:0;width:100vw;height:100vh;max-height:100vh;border-radius:0;}.bt-trigger{bottom:20px;right:20px;width:56px;height:56px;}}
  </style>
  
  <button class="bt-trigger" id="btTrigger">
    <span class="bt-badge" id="btBadge"></span>
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
  </button>
  
  <div class="bt-window" id="btWindow">
    <div class="bt-head">
      <div class="bt-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="bt-head-info">
        <h3>BoilerTech Energy</h3>
        <div class="bt-online">Online — Ready to assist</div>
      </div>
      <button class="bt-close" id="btClose">
        <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="bt-msgs" id="btMsgs"></div>
    <div class="bt-inp-area">
      <input class="bt-inp" id="btInp" type="text" placeholder="Type your message..." autocomplete="off"/>
      <button class="bt-send" id="btSendBtn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="bt-foot">⚡ Powered by BoilerTech Energy Services</div>
  </div>
  
  <script>
  (function(){
  if(window._btChatLoaded)return;
  window._btChatLoaded=true;
  
  var PHONE='919445651070';
  var chatOpen=false;
  var currentSvc=null;
  
  var KB=[
    {id:'shutdown',name:'Shutdown Inspection',e:'🔧',
     desc:'Complete boiler inspection during shutdown — pressure parts thickness measurement, flue gas & water/steam side inspection, non-pressure parts check, and operating log review.',
     kw:['shutdown','inspection','thickness','pressure','flue']},
    {id:'performance',name:'Performance Improvement',e:'📊',
     desc:'Combustion efficiency improvement & auxiliary power reduction — direct/indirect efficiency calculation, air analysis, thermography survey for insulation loss, pump/fan efficiency measurement.',
     kw:['performance','efficiency','combustion','thermography','fuel','improve','optimization']},
    {id:'troubleshoot',name:'Troubleshooting & RCA',e:'🔍',
     desc:'Expert diagnosis of tube failures, high bed temperature, heat exchanger vibration, low steam temperature, water carryover, high unburnt, low fan performance — with solutions to prevent recurrence.',
     kw:['trouble','problem','tube','vibration','steam','carryover','unburnt','issue','fix','failure']},
    {id:'training',name:'Onsite Operator Training',e:'🎓',
     desc:'Comprehensive onsite training for boiler operators — classroom sessions plus hands-on field training to enhance operating and analytical skills.',
     kw:['training','operator','skill','learn','teach','class']},
    {id:'altfuel',name:'Alternative Fuel Study',e:'🌱',
     desc:'Feasibility study for switching fuels — covering fan capacity, pressure part heat transfer area, bed fluidization velocity, and overall system compatibility.',
     kw:['alternative','fuel','switch','coal','biomass','study','renewable']},
    {id:'petcoke',name:'100% Petcoke Firing',e:'⚡',
     desc:'Proven expertise in running 100% petcoke in existing boilers without major modifications — cost-effective as coal prices rise.',
     kw:['petcoke','pet coke','petroleum','coke']},
    {id:'audit',name:'Field Quality Auditing',e:'📋',
     desc:'On-site auditing to verify boiler parts and auxiliaries are erected as per design requirements — prevents issues caused by erection deviations.',
     kw:['audit','quality','erection','field','design','check']}
  ];
  
  var BOT='<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  var USR='<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
  var WA='<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
  
  function g(id){return document.getElementById(id);}
  function sc(){var m=g('btMsgs');if(m)setTimeout(function(){m.scrollTop=m.scrollHeight;},60);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  
  function addMsg(role,html){
    var m=g('btMsgs');if(!m)return;
    var d=document.createElement('div');
    d.className='bt-msg '+role;
    if(role==='bot'){d.innerHTML='<div class="bt-av">'+BOT+'</div><div class="bt-bubble">'+html+'</div>';}
    else{d.innerHTML='<div class="bt-bubble">'+esc(html)+'</div><div class="bt-av">'+USR+'</div>';}
    m.appendChild(d);sc();
  }
  
  function addRaw(html){
    var m=g('btMsgs');if(!m)return;
    var d=document.createElement('div');
    d.className='bt-msg bot';
    d.innerHTML='<div class="bt-av">'+BOT+'</div><div style="flex:1;min-width:0">'+html+'</div>';
    m.appendChild(d);sc();
  }
  
  function addQRs(opts){
    var m=g('btMsgs');if(!m)return;
    removeQR();
    var w=document.createElement('div');
    w.className='bt-qrs';w.id='btQR';
    opts.forEach(function(o){
      var b=document.createElement('button');
      b.className='bt-qr';b.textContent=o.label;
      b.onclick=function(){removeQR();handleQR(o);};
      w.appendChild(b);
    });
    m.appendChild(w);sc();
  }
  
  function removeQR(){var q=g('btQR');if(q)q.remove();}
  
  function showTyping(){
    var m=g('btMsgs');if(!m)return;
    var d=document.createElement('div');
    d.className='bt-typing';d.id='btTyping';
    d.innerHTML='<div class="bt-av" style="background:linear-gradient(135deg,#FFA500,#1CB5D8)">'+BOT+'</div><div class="bt-typing-dots"><span></span><span></span><span></span></div>';
    m.appendChild(d);sc();
  }
  function hideTyping(){var t=g('btTyping');if(t)t.remove();}
  
  function say(html,delay){
    return new Promise(function(res){
      showTyping();
      setTimeout(function(){hideTyping();addMsg('bot',html);res();},delay||700);
    });
  }
  function sayRaw(html,delay){
    return new Promise(function(res){
      showTyping();
      setTimeout(function(){hideTyping();addRaw(html);res();},delay||700);
    });
  }
  
  function mainMenu(){
    addQRs([
      {label:'🔧 Our Services',a:'services'},
      {label:'📋 Get a Quote',a:'enquiry'},
      {label:'💬 WhatsApp Us',a:'whatsapp'},
      {label:'📞 Contact Info',a:'contact'},
      {label:'🏢 About Us',a:'about'}
    ]);
  }
  
  function waURL(msg){return'https://wa.me/'+PHONE+'?text='+encodeURIComponent(msg);}
  
  async function handleQR(o){
    addMsg('user',o.label);
    if(o.a==='services'){
      await say('Here are our expert boiler services 👇',500);
      showSvcs();
    } else if(o.a==='enquiry'){
      await say('Let me get your details for a quote:',500);
      showForm();
    } else if(o.a==='whatsapp'){
      var msg=currentSvc?'Hi, I\'m interested in your "'+currentSvc.name+'" service. Please share more details.':'Hi, I visited your website and would like to know more about your boiler services.';
      await sayRaw('<a class="bt-wa" href="'+waURL(msg)+'" target="_blank">'+WA+'<span>Chat with us on WhatsApp →</span></a>',400);
      await say('Anything else I can help with?',500);
      mainMenu();
    } else if(o.a==='contact'){
      await sayRaw('<div class="bt-bubble" style="background:var(--bt-surface);border:1px solid var(--bt-border);border-bottom-left-radius:4px"><strong>📍 Address</strong><br>130/1, Periyar Street, Erode – 638001, Tamil Nadu<br><br><strong>📞 Phone</strong><br><a href="tel:+917708397080">+91 77083 97080</a><br><br><strong>✉️ Email</strong><br><a href="mailto:director@boilertechenergy.com">director@boilertechenergy.com</a></div><a class="bt-wa" href="'+waURL('Hi, I need boiler services. Please contact me.')+'" target="_blank">'+WA+'<span>Quick chat on WhatsApp →</span></a>',500);
      await say('Anything else?',400);
      mainMenu();
    } else if(o.a==='about'){
      await say('<strong>BoilerTech Energy Services</strong> is a specialist for <strong>AFBC, CFBC & Travelling Grate</strong> boilers.<br><br>📍 Erode, Tamil Nadu — serving industries pan-India since 2015.<br>🏆 <strong>500+ projects</strong> · <strong>98% efficiency rate</strong> · <strong>10+ years</strong>',700);
      await say('Anything else I can help with?',400);
      mainMenu();
    } else if(o.a==='svc'){
      var svc=KB.find(function(s){return s.id===o.id;});
      if(svc){
        currentSvc=svc;
        await sayRaw('<div class="bt-svc-card"><h5>'+svc.e+' '+svc.name+'</h5><p>'+svc.desc+'</p></div>',600);
        await say('Would you like a quote or want to connect with us?',400);
        addQRs([
          {label:'📋 Get Quote',a:'enquiry'},
          {label:'💬 WhatsApp Us',a:'whatsapp'},
          {label:'◀ Back to Menu',a:'back'}
        ]);
      }
    } else if(o.a==='back'){
      currentSvc=null;
      await say('Sure! What else can I help you with?',400);
      mainMenu();
    }
  }
  
  function showSvcs(){
    var m=g('btMsgs');if(!m)return;
    KB.forEach(function(svc,i){
      setTimeout(function(){
        var d=document.createElement('div');
        d.className='bt-msg bot';
        d.innerHTML='<div class="bt-av">'+BOT+'</div><div style="flex:1;min-width:0"><div class="bt-svc-card"><h5>'+svc.e+' '+svc.name+'</h5><p>'+svc.desc.substring(0,88)+'...</p></div></div>';
        d.querySelector('.bt-svc-card').onclick=function(){handleQR({label:svc.name,a:'svc',id:svc.id});};
        m.appendChild(d);sc();
      },i*180);
    });
    setTimeout(function(){
      addQRs([{label:'📋 Get a Quote',a:'enquiry'},{label:'💬 WhatsApp Us',a:'whatsapp'},{label:'◀ Back',a:'back'}]);
    },KB.length*180+300);
  }
  
  function showForm(){
    var m=g('btMsgs');if(!m)return;
    var d=document.createElement('div');
    d.className='bt-msg bot';
    d.innerHTML='<div class="bt-av">'+BOT+'</div><div style="flex:1;min-width:0"><div class="bt-lead-form" id="btLF"><h4>📋 Quick Enquiry</h4><input id="lN" type="text" placeholder="Your Name *"/><input id="lP" type="text" placeholder="Phone Number *"/><input id="lE" type="email" placeholder="Email Address"/><input id="lC" type="text" placeholder="Company / Plant Name"/><textarea id="lM" placeholder="Brief requirement..."></textarea><button class="bt-lead-submit" id="lSub">Submit Enquiry →</button></div></div>';
    m.appendChild(d);sc();
    setTimeout(function(){var b=g('lSub');if(b)b.onclick=doSubmit;},100);
  }
  
  async function doSubmit(){
    var n=(g('lN')||{}).value||'';var p=(g('lP')||{}).value||'';
    var e=(g('lE')||{}).value||'';var c=(g('lC')||{}).value||'';var ms=(g('lM')||{}).value||'';
    n=n.trim();p=p.trim();
    if(!n||!p){alert('Please enter your name and phone number.');return;}
    var f=g('btLF');
    if(f)f.innerHTML='<p style="color:#22C55E;font-size:13px;padding:14px;text-align:center">✅ Enquiry submitted! We\'ll contact you shortly.</p>';
    console.log('📩 NEW LEAD:',{name:n,phone:p,email:e,company:c,message:ms,service:currentSvc?currentSvc.name:'General'});
    await say('Thank you, <strong>'+esc(n)+'</strong>! 🙏<br>We\'ll reach out to you at <strong>'+esc(p)+'</strong> shortly.',700);
    var wm='Hi, I\'m '+n+(c?' from '+c:'')+'. '+(ms||'I need boiler services. Please contact me.');
    await sayRaw('<a class="bt-wa" href="'+waURL(wm)+'" target="_blank">'+WA+'<span>Continue on WhatsApp for faster reply →</span></a>',400);
    await say('Is there anything else I can help with?',500);
    mainMenu();
  }
  
  async function processText(txt){
    var low=txt.toLowerCase();
    if(/service|services|what do you|offer/i.test(low)){await say('Here are our expert services 👇',500);showSvcs();return;}
    if(/quote|enquiry|pricing|cost|price|rate/i.test(low)){await say('Let me get your details:',500);showForm();return;}
    if(/phone|call|email|address|location|reach|office/i.test(low)){handleQR({label:'Contact Info',a:'contact'});return;}
    if(/whatsapp|wa\b|chat/i.test(low)){handleQR({label:'WhatsApp Us',a:'whatsapp'});return;}
    if(/about|who are you|company|boilertech/i.test(low)){handleQR({label:'About Us',a:'about'});return;}
    if(/^(hi|hello|hey|vanakkam|namaste|good)/i.test(low)){await say('Hello! 👋 How can I assist you today?',400);mainMenu();return;}
    if(/thank|thanks|okay|ok|great|perfect/i.test(low)){await say('You\'re welcome! 😊 Feel free to ask anything.',400);mainMenu();return;}
    var matched=KB.filter(function(s){return s.kw.some(function(k){return low.includes(k);});});
    if(matched.length===1){handleQR({label:matched[0].name,a:'svc',id:matched[0].id});return;}
    if(matched.length>1){
      await say('Found '+matched.length+' relevant services:',500);
      var m=g('btMsgs');
      matched.forEach(function(svc,i){
        setTimeout(function(){
          var d=document.createElement('div');
          d.className='bt-msg bot';
          d.innerHTML='<div class="bt-av">'+BOT+'</div><div style="flex:1;min-width:0"><div class="bt-svc-card"><h5>'+svc.e+' '+svc.name+'</h5><p>'+svc.desc.substring(0,88)+'...</p></div></div>';
          d.querySelector('.bt-svc-card').onclick=function(){handleQR({label:svc.name,a:'svc',id:svc.id});};
          m.appendChild(d);sc();
        },i*180);
      });
      return;
    }
    await say('Thanks for your message! Our team can help with specific queries.',600);
    addQRs([{label:'📋 Submit Enquiry',a:'enquiry'},{label:'💬 WhatsApp Us',a:'whatsapp'},{label:'◀ Main Menu',a:'back'}]);
  }
  
  function toggleChat(){
    chatOpen=!chatOpen;
    var w=g('btWindow');var t=g('btTrigger');
    if(!w||!t)return;
    w.classList.toggle('open',chatOpen);
    t.classList.toggle('active',chatOpen);
    var badge=g('btBadge');
    if(chatOpen&&badge)badge.style.display='none';
    if(chatOpen){
      var msgs=g('btMsgs');
      if(msgs&&msgs.children.length===0){
        setTimeout(async function(){
          await say('👋 Welcome to <strong>BoilerTech Energy Services!</strong><br><br>We specialize in <strong>AFBC, CFBC & Travelling Grate</strong> boilers — boosting performance, availability & efficiency.',600);
          await say('How can I help you today?',400);
          mainMenu();
        },200);
      }
      var inp=g('btInp');if(inp)inp.focus();
    }
  }
  
  function sendMsg(){
    var inp=g('btInp');if(!inp)return;
    var txt=inp.value.trim();if(!txt)return;
    inp.value='';
    removeQR();
    addMsg('user',txt);
    processText(txt);
  }
  
  // Bind events
  var tr=g('btTrigger');var cl=g('btClose');var sb=g('btSendBtn');var ii=g('btInp');
  if(tr)tr.addEventListener('click',toggleChat);
  if(cl)cl.addEventListener('click',toggleChat);
  if(sb)sb.addEventListener('click',sendMsg);
  if(ii)ii.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  
  // Badge
  setTimeout(function(){var b=g('btBadge');if(b&&!chatOpen)b.style.display='block';},3000);
  
  })();
  </script>
